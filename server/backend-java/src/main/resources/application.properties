spring.application.name=backend2
server.port=${PORT:3000}
server.address=${HOST:0.0.0.0}

spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:tictactoe}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

socketio.host=${SOCKET_HOST:0.0.0.0}
socketio.port=${SOCKET_PORT:3001}
socketio.origin=${SOCKET_ORIGIN:*}
app.instance-id=${INSTANCE_ID:}
